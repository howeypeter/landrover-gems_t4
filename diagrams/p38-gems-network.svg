<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="950" viewBox="0 0 1200 950">
<title>P38 Range Rover GEMS diagnostic and operating networks</title>
<desc>Single K-line diagnostic wire (pin 7 of J1962) shared by all ECUs. Tester-initiated half-duplex ISO 9141 communication. Separate point-to-point wires for real-time coordination.</desc>
<style>
  svg { background: #fafaf8; }
  text { font-family: Segoe UI, Arial, sans-serif; fill: #2c2c2a; }
  .title { font-size: 18px; font-weight: 600; }
  .section { font-size: 12px; font-weight: 600; fill: #666662; text-transform: uppercase; }
  .label { font-size: 12px; font-weight: 500; }
  .small { font-size: 10px; fill: #666662; }
  .tiny { font-size: 9px; fill: #888883; }
  .info-box { font-size: 10px; fill: #0d47a1; font-weight: 500; }

  .box-engine { fill: #ffe0b2; stroke: #e65100; stroke-width: 2; }
  .box-trans { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 2; }
  .box-susp { fill: #b2dfdb; stroke: #00695c; stroke-width: 2; }
  .box-body { fill: #fce4ec; stroke: #c2185b; stroke-width: 2; }
  .box-isolated { fill: #eeeeee; stroke: #999999; stroke-width: 1.5; stroke-dasharray: 3,2; }
  .box-diag { fill: #f1f8e9; stroke: #558b2f; stroke-width: 2; }

  .kline { stroke: #2e7d32; stroke-width: 4; fill: none; }
  .kline-label { font-size: 11px; font-weight: 600; fill: #2e7d32; }
  .serial { stroke: #1976d2; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
  .pwm { stroke: #f57c00; stroke-width: 2; fill: none; stroke-dasharray: 3,2; }
  .hardwire { stroke: #d32f2f; stroke-width: 2; fill: none; }
  .analog-12v { stroke: #666666; stroke-width: 1.5; fill: none; stroke-dasharray: 2,2; }
  .tap { stroke: #2e7d32; stroke-width: 2; fill: none; }

  .conn-label { font-size: 10px; fill: #555551; font-style: italic; }
  .isolated-label { font-size: 11px; fill: #999999; font-weight: 500; }
  .kline-info { font-size: 9px; fill: #0d47a1; }

  /* Grouping backgrounds */
  .integration-zone { fill: #f5f5f5; stroke: #cccccc; stroke-width: 2; stroke-dasharray: 5,5; }
</style>

<defs>
  <marker id="arr-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <polygon points="0 0, 10 3, 0 6" fill="#2e7d32"/>
  </marker>
  <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <polygon points="0 0, 10 3, 0 6" fill="#1976d2"/>
  </marker>
  <marker id="arr-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <polygon points="0 0, 10 3, 0 6" fill="#f57c00"/>
  </marker>
  <marker id="arr-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <polygon points="0 0, 10 3, 0 6" fill="#d32f2f"/>
  </marker>
</defs>

<rect width="1200" height="950" fill="#fafaf8"/>

<!-- Title -->
<text class="title" x="600" y="30" text-anchor="middle">P38 Range Rover GEMS Network — Single K-Line Diagnostic Wire + Point-to-Point Operating Wires</text>
<text class="small" x="600" y="50" text-anchor="middle">K-Line: one shared diagnostic wire (ISO 9141, pin 7 of J1962) | Operating: separate hardwired coordination</text>

<!-- K-LINE INFO BOX -->
<rect x="50" y="65" width="900" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text class="kline-info" x="70" y="82">K-Line (ISO 9141): Single half-duplex diagnostic wire (~10.4 kbit/s). TestBook polls each ECU by address. ALL ECUs share this ONE wire (not a bus—tester-initiated, no module-to-module chatter).</text>

<!-- DIAGNOSTIC CONNECTION PATH -->
<text class="section" x="50" y="125">How TestBook reaches the K-Line</text>

<rect x="50" y="145" width="110" height="50" rx="5" class="box-diag"/>
<text class="label" x="105" y="170" text-anchor="middle">TestBook T4</text>
<text class="small" x="105" y="185" text-anchor="middle">RDS 5.06</text>

<line x1="160" y1="170" x2="180" y2="170" class="hardwire" marker-end="url(#arr-red)"/>

<rect x="180" y="145" width="110" height="50" rx="5" class="box-diag"/>
<text class="label" x="235" y="170" text-anchor="middle">VCSI</text>
<text class="small" x="235" y="185" text-anchor="middle">FPGA interface</text>

<line x1="290" y1="170" x2="310" y2="170" class="hardwire" marker-end="url(#arr-red)"/>

<rect x="310" y="145" width="110" height="50" rx="5" class="box-diag"/>
<text class="label" x="365" y="170" text-anchor="middle">J1962</text>
<text class="small" x="365" y="185" text-anchor="middle">OBD socket</text>

<line x1="420" y1="170" x2="500" y2="170" class="hardwire" marker-end="url(#arr-red)"/>

<rect x="500" y="145" width="150" height="50" rx="5" class="box-diag"/>
<text class="label" x="575" y="168" text-anchor="middle">K-Line (ISO 9141)</text>
<text class="small" x="575" y="183" text-anchor="middle">pin 7, ~10.4 kbit/s</text>

<!-- THE ACTUAL K-LINE (single shared wire) -->
<line x1="100" y1="230" x2="1050" y2="230" class="kline" marker-end="url(#arr-green)"/>
<text class="kline-label" x="1070" y="235">ONE shared diagnostic wire (all ECUs tap here)</text>

<!-- INTEGRATED REAL-TIME COORDINATION NETWORK (visual grouping) -->
<rect x="40" y="260" width="900" height="420" rx="8" class="integration-zone"/>
<text class="section" x="60" y="280">Integrated Real-Time Coordination Network</text>
<text class="tiny" x="60" y="295">(separate hardwired point-to-point wires for real-time control—NOT on K-Line)</text>

<!-- TOP ROW: ENGINE AND TRANSMISSION -->
<text class="section" x="60" y="320">Engine &amp; Transmission</text>

<!-- GEMS ECM -->
<line x1="150" y1="200" x2="150" y2="230" class="tap"/>
<rect x="80" y="340" width="140" height="90" rx="6" class="box-engine"/>
<text class="label" x="150" y="365" text-anchor="middle">GEMS ECM</text>
<text class="small" x="150" y="382" text-anchor="middle">Fuel injection control</text>
<text class="small" x="150" y="397" text-anchor="middle">Ignition timing</text>
<text class="small" x="150" y="412" text-anchor="middle">Adaptive engine learning</text>

<!-- EAT ECU -->
<line x1="380" y1="200" x2="380" y2="230" class="tap"/>
<rect x="310" y="340" width="140" height="90" rx="6" class="box-trans"/>
<text class="label" x="380" y="365" text-anchor="middle">EAT ECU</text>
<text class="small" x="380" y="382" text-anchor="middle">ZF 4HP24 gearbox</text>
<text class="small" x="380" y="397" text-anchor="middle">Shift control &amp; timing</text>
<text class="small" x="380" y="412" text-anchor="middle">Lockup/torque conversion</text>

<!-- Torque reduction between GEMS and EAT (point-to-point hardwire, NOT on K-Line) -->
<path d="M220 385 L310 385" class="hardwire" marker-start="url(#arr-red)" marker-end="url(#arr-red)"/>
<text class="conn-label" x="255" y="378">↔ Torque request (hardwire)</text>

<!-- MIDDLE ROW: SUSPENSION AND CHASSIS -->
<text class="section" x="60" y="470">Suspension &amp; Chassis</text>

<!-- ABS ECU -->
<line x1="550" y1="200" x2="550" y2="230" class="tap"/>
<rect x="480" y="490" width="140" height="90" rx="6" class="box-susp"/>
<text class="label" x="550" y="515" text-anchor="middle">ABS ECU</text>
<text class="small" x="550" y="532" text-anchor="middle">Wabco ABS system</text>
<text class="small" x="550" y="547" text-anchor="middle">Traction control &amp;</text>
<text class="small" x="550" y="562" text-anchor="middle">brake modulation</text>

<!-- EAS ECU -->
<line x1="750" y1="200" x2="750" y2="230" class="tap"/>
<rect x="680" y="490" width="140" height="90" rx="6" class="box-susp"/>
<text class="label" x="750" y="515" text-anchor="middle">EAS ECU</text>
<text class="small" x="750" y="532" text-anchor="middle">Air suspension system</text>
<text class="small" x="750" y="547" text-anchor="middle">Height/mode control</text>
<text class="small" x="750" y="562" text-anchor="middle">Compressor &amp; solenoids</text>

<!-- ABS speed signal to instruments (point-to-point hardwire PWM) -->
<path d="M550 490 Q600 460 480 440" class="pwm" marker-end="url(#arr-orange)"/>
<text class="conn-label" x="550" y="465">Road speed PWM (hardwire)</text>

<!-- EAS status to BeCM (point-to-point serial link) -->
<path d="M680 540 Q650 600 330 685" class="serial" marker-end="url(#arr-blue)"/>
<text class="conn-label" x="640" y="570">EAS → BeCM (serial link)</text>

<!-- BOTTOM ROW: BODY CONTROL AND SYSTEMS -->
<text class="section" x="60" y="630">Body Control &amp; Coordinated Systems</text>

<!-- BeCM (THE HUB - highlighted) -->
<line x1="250" y1="200" x2="250" y2="230" class="tap"/>
<rect x="170" y="680" width="160" height="110" rx="8" class="box-body" stroke-width="3"/>
<text class="label" x="250" y="708" text-anchor="middle" font-weight="bold">BeCM (Hub)</text>
<text class="small" x="250" y="725" text-anchor="middle">Body electrical control</text>
<text class="small" x="250" y="740" text-anchor="middle">Locks, lighting, alarm,</text>
<text class="small" x="250" y="755" text-anchor="middle">relays, immobiliser</text>

<!-- Instrument Pack / Message Centre -->
<line x1="450" y1="200" x2="450" y2="230" class="tap"/>
<rect x="380" y="680" width="140" height="110" rx="6" class="box-body"/>
<text class="label" x="450" y="708" text-anchor="middle">Instruments</text>
<text class="small" x="450" y="725" text-anchor="middle">Gauges &amp; speedo</text>
<text class="small" x="450" y="740" text-anchor="middle">Message centre text:</text>
<text class="small" x="450" y="755" text-anchor="middle">"EAS FAULT", "SLOW 35"</text>

<!-- BeCM ↔ Message Centre (serial link, point-to-point) -->
<path d="M330 735 L380 735" class="serial" marker-start="url(#arr-blue)" marker-end="url(#arr-blue)"/>
<text class="conn-label" x="340" y="728">Serial link</text>

<!-- BeCM → GEMS (immobiliser, serial link, point-to-point) -->
<path d="M210 680 Q180 520 160 430" class="serial" marker-end="url(#arr-blue)"/>
<text class="conn-label" x="185" y="550">Mobilisation (serial)</text>

<!-- Door Outstations (serial links via BeCM) -->
<path d="M250 790 L250 830 Q150 850 100 850" class="serial" marker-start="url(#arr-blue)" marker-end="url(#arr-blue)"/>
<rect x="30" y="835" width="140" height="50" rx="4" class="box-body"/>
<text class="label" x="100" y="860" text-anchor="middle">Door Outstations</text>
<text class="small" x="100" y="875" text-anchor="middle">Windows, locks, switches</text>
<text class="conn-label" x="220" y="820">Serial links</text>

<!-- END OF INTEGRATION ZONE -->

<!-- ISOLATED SYSTEMS (outside the integration zone) -->
<text class="section" x="50" y="920">Isolated Systems (taps K-Line for diagnostics only)</text>

<!-- SRS ECU - ISOLATED -->
<line x1="650" y1="200" x2="650" y2="230" class="tap"/>
<rect x="600" y="750" width="140" height="100" rx="6" class="box-isolated"/>
<text class="label" x="670" y="780" text-anchor="middle">SRS ECU</text>
<text class="small" x="670" y="797" text-anchor="middle">Airbag control</text>
<text class="small" x="670" y="812" text-anchor="middle">Crash detection</text>
<text class="small" x="670" y="827" text-anchor="middle">&amp; seat belt</text>
<text class="small" x="670" y="842" text-anchor="middle">pretensioner</text>
<text class="isolated-label" x="670" y="870" text-anchor="middle">K-line only</text>

<!-- HEVAC ECU - ISOLATED -->
<line x1="900" y1="200" x2="900" y2="230" class="tap"/>
<rect x="830" y="750" width="140" height="100" rx="6" class="box-isolated"/>
<text class="label" x="900" y="780" text-anchor="middle">HEVAC ECU</text>
<text class="small" x="900" y="797" text-anchor="middle">Climate control</text>
<text class="small" x="900" y="812" text-anchor="middle">Blend motors</text>
<text class="small" x="900" y="827" text-anchor="middle">&amp; A/C</text>
<text class="small" x="900" y="842" text-anchor="middle">compressor</text>
<text class="isolated-label" x="900" y="870" text-anchor="middle">K-line + 12V analogue</text>

<!-- Analogue 12V inputs to HEVAC -->
<path d="M950 760 L1000 760" class="analog-12v" marker-end="url(#arr-red)"/>
<text class="conn-label" x="970" y="753">A/C request (12V)</text>
<path d="M950 800 L1000 800" class="analog-12v" marker-end="url(#arr-red)"/>
<text class="conn-label" x="970" y="793">Fan control (12V)</text>

</svg>
